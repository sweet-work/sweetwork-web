services:
  web:
    build:
      context: .
      args:
        # Proxy /api/* to the API container published on the host (:8000),
        # instead of the remote Render API. host.docker.internal resolves to the
        # host via the extra_hosts mapping below.
        API_PROXY_TARGET: http://host.docker.internal:8000
    image: sweetwork-web
    container_name: sweetwork-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    # Lets the container reach services published on the host (the API on :8000).
    extra_hosts:
      - "host.docker.internal:host-gateway"
